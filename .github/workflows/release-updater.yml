name: Release updater package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Empty value uses neutralino.config.json version, for example v1.0.1.'
        required: false
        type: string
      prerelease:
        description: 'Create the release as a prerelease. Prereleases are not used by the app latest-release updater.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-updater-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish updater assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $config = Get-Content neutralino.config.json -Raw | ConvertFrom-Json
          $version = [string]$config.version

          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } elseif ($env:INPUT_TAG) {
            $tag = $env:INPUT_TAG
          } else {
            $tag = "v$version"
          }

          if (-not $tag.StartsWith('v')) {
            $tag = "v$tag"
          }

          if ($tag -ne "v$version") {
            throw "Release tag '$tag' does not match neutralino.config.json version '$version'. Use tag 'v$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build updater package
        run: npm run release:prepare

      - name: Verify release asset
        shell: pwsh
        run: |
          if (-not (Test-Path dist/resources.neu)) {
            throw 'dist/resources.neu was not generated.'
          }
          if ((Get-Item dist/resources.neu).Length -lt 1024) {
            throw 'dist/resources.neu is too small.'
          }

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          $releaseExists = $false
          $releaseJson = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:TAG" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          if ($releaseExists) {
            $release = $releaseJson | ConvertFrom-Json
            $isPrerelease = $env:PRERELEASE -eq 'true'
            $makeLatest = if ($isPrerelease) { 'false' } else { 'true' }
            $payload = @{
              draft = $false
              prerelease = $isPrerelease
              make_latest = $makeLatest
            } | ConvertTo-Json -Compress

            $payload | gh api --method PATCH "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)" --input -
            gh release delete-asset $env:TAG update.json -y --repo $env:GITHUB_REPOSITORY 2>$null
            gh release upload $env:TAG dist/resources.neu --clobber --repo $env:GITHUB_REPOSITORY
            exit $LASTEXITCODE
          }

          $ghArgs = @(
            'release',
            'create',
            $env:TAG,
            'dist/resources.neu',
            '--repo',
            $env:GITHUB_REPOSITORY,
            '--target',
            $env:GITHUB_SHA,
            '--title',
            $env:TAG,
            '--notes',
            "Auto update package for $env:TAG"
          )

          if ($env:PRERELEASE -eq 'true') {
            $ghArgs += '--prerelease'
          }

          gh @ghArgs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ steps.meta.outputs.tag }}
          path: |
            dist/resources.neu
